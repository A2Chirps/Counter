<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Counter Overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: transparent; width: fit-content; height: fit-content; }
  .counter-box {
    background: rgba(60, 20, 100, 0.88);
    border: 1.5px solid rgba(167, 139, 250, 0.4);
    border-radius: 16px;
    padding: 18px 32px;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .label {
    color: #a78bfa;
    font-family: 'Segoe UI', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .number {
    color: #f0e6ff;
    font-family: 'Segoe UI', sans-serif;
    font-size: 72px;
    font-weight: 800;
    line-height: 1;
    transition: transform 0.12s ease;
  }
  .number.bump { transform: scale(1.18); }
</style>
</head>
<body>
<div class="counter-box">
  <div class="label">3's Made</div>
  <div class="number" id="num">0</div>
</div>

<!-- PASTE YOUR FIREBASE CONFIG HERE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBsjUq6mvCwKGr9n64Oo7pGft8NqGcUIaU",
    authDomain: "website-firebase-17385.firebaseapp.com",
    databaseURL: "https://website-firebase-17385-default-rtdb.firebaseio.com",
    projectId: "website-firebase-17385",
    storageBucket: "website-firebase-17385.firebasestorage.app",
    messagingSenderId: "934443626587",
    appId: "1:934443626587:web:12d642d7d1fb4d7cc1cf7e"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  onValue(ref(db, 'counter'), (snapshot) => {
    const val = snapshot.val();
    if (val !== null) {
      document.getElementById('num').textContent = val;
      const el = document.getElementById('num');
      el.classList.add('bump');
      setTimeout(() => el.classList.remove('bump'), 140);
    }
  });
</script>
</body>
</html>
